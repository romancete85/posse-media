# Refresca el access token de LinkedIn antes de que expire (~60d) y lo reescribe en SSM.
name: refresh-tokens

on:
  schedule:
    - cron: "0 6 */45 * *"   # cada ~45 dias (margen sobre los ~60d del access token)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
      LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      SSM_TOKEN_PARAM: ${{ vars.SSM_TOKEN_PARAM }}
      TOKEN_STORE_BACKEND: ssm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar
        run: pip install .

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Refrescar token
        run: posse refresh
